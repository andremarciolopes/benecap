<svg
  [attr.width]="size"
  [attr.height]="size"
  [class]="class"
  [attr.fill]="fill"
  [attr.stroke]="stroke"
  viewBox="0 0 24 24"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <ng-container [ngSwitch]="name">
    <!-- Search -->
    <g *ngSwitchCase="'search'">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </g>
    <!-- Phone -->
    <g *ngSwitchCase="'phone'">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
    </g>
    <!-- Shield -->
    <g *ngSwitchCase="'shield'">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
    </g>
    <!-- ArrowRight -->
    <g *ngSwitchCase="'arrow-right'">
      <line x1="5" y1="12" x2="19" y2="12"></line>
      <polyline points="12 5 19 12 12 19"></polyline>
    </g>
    <!-- Building2 -->
    <g *ngSwitchCase="'building-2'">
      <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path>
      <path d="M6 12h12"></path>
      <path d="M6 16h12"></path>
      <path d="M6 20h12"></path>
      <path d="M6 8h12"></path>
    </g>
    <!-- Award -->
    <g *ngSwitchCase="'award'">
      <circle cx="12" cy="8" r="6"></circle>
      <path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"></path>
    </g>
    <!-- FileCheck -->
    <g *ngSwitchCase="'file-check'">
      <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <path d="m9 15 2 2 4-4"></path>
    </g>
    <!-- MapPin -->
    <g *ngSwitchCase="'map-pin'">
      <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
      <circle cx="12" cy="10" r="3"></circle>
    </g>
    <!-- Clock -->
    <g *ngSwitchCase="'clock'">
      <circle cx="12" cy="12" r="10"></circle>
      <polyline points="12 6 12 12 16 14"></polyline>
    </g>
    <!-- Network -->
    <g *ngSwitchCase="'network'">
      <rect x="16" y="16" width="6" height="6" rx="1"></rect>
      <rect x="2" y="16" width="6" height="6" rx="1"></rect>
      <rect x="9" y="2" width="6" height="6" rx="1"></rect>
      <path d="M5 16v-6a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v6"></path>
      <path d="M12 9V2"></path>
    </g>
    <!-- HeartPulse -->
    <g *ngSwitchCase="'heart-pulse'">
      <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
      <path d="M3.13 9.58a2.5 2.5 0 0 0 .87 3.42l7.5 4.5a2.5 2.5 0 0 0 2.5 0l7.5-4.5a2.5 2.5 0 0 0 .87-3.42"></path>
      <path d="m3 8 2.5 2.5L8 7"></path>
      <path d="m21 8-2.5 2.5L16 7"></path>
    </g>
    <!-- Users -->
    <g *ngSwitchCase="'users'">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
      <circle cx="9" cy="7" r="4"></circle>
      <path d="m22 21-2-2"></path>
      <path d="M16 7a4 4 0 0 1 0 8"></path>
    </g>
    <!-- CheckCircle -->
    <g *ngSwitchCase="'check-circle'">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
      <polyline points="22 4 12 14.01 9 11.01"></polyline>
    </g>
    <!-- Mail -->
    <g *ngSwitchCase="'mail'">
      <rect width="20" height="16" x="2" y="4" rx="2"></rect>
      <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
    </g>
  </ng-container>
</svg>
